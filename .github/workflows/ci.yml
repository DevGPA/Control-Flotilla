name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:cov

      - name: XSS audit (innerHTML patterns en legado)
        run: npm run audit:xss

      - name: npm audit (high+ only)
        run: npm audit --audit-level=high --omit=dev
        # --omit=dev: ignoramos dev-tool vulns (workbox chain, solo build-time).
        # Si algún vuln high+ entra en runtime, rompe build.

      - name: Build
        run: npm run build

      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
