customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=()'
      - key: 'Cross-Origin-Opener-Policy'
        value: 'same-origin'
      - key: 'Cross-Origin-Resource-Policy'
        value: 'same-origin'
      # CSP movida al <meta> del HTML — el script compute-csp-hashes.mjs
      # la mantiene sincronizada con los hashes de inline scripts. Duplicar
      # acá causa drift entre header (stale) y meta (fresh) cuando se editan
      # inline scripts. X-Frame-Options DENY arriba cubre frame-ancestors.

  # ⚠️ ORDEN IMPORTA: en Amplify Hosting, cuando varios patterns matchean,
  # GANA LA ÚLTIMA regla. Los catch-all van PRIMERO y los archivos específicos
  # (sw.js, registerSW.js, manifest) AL FINAL para que los sobrescriban.
  # Incidente 2026-06-09: sw.js se servía con max-age=1año immutable (la regla
  # genérica de .js pisaba la suya) → usuarios atascados en versiones viejas
  # de la PWA hasta hacer hard refresh.

  # Assets con hash — cache agresivo 1 año
  - pattern: '**/*.@(js|css|woff2)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.@(png|jpg|jpeg|gif|ico|svg|webp)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # index.html SIEMPRE fresco — evita que apunte a assets con hash viejos
  # (página sin CSS intermitente tras deploys). Revalida con ETag (304 barato).
  - pattern: '/'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, must-revalidate'
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, must-revalidate'
  - pattern: '**/*.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, must-revalidate'

  # Service worker y registro NO cache (PWA fresh updates) — DEBEN ir después
  # del catch-all de .js para ganarle.
  - pattern: '**/sw.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/service-worker.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/registerSW.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/manifest.webmanifest'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, must-revalidate'
