customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=()'
      - key: 'Cross-Origin-Opener-Policy'
        value: 'same-origin'
      - key: 'Cross-Origin-Resource-Policy'
        value: 'same-origin'
      # CSP movida al <meta> del HTML — el script compute-csp-hashes.mjs
      # la mantiene sincronizada con los hashes de inline scripts. Duplicar
      # acá causa drift entre header (stale) y meta (fresh) cuando se editan
      # inline scripts. X-Frame-Options DENY arriba cubre frame-ancestors.

  # Service worker NO cache (PWA fresh updates)
  - pattern: '**/sw.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/service-worker.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/registerSW.js'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'

  # Assets con hash — cache agresivo 1 año
  - pattern: '**/*.@(js|css|woff2)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.@(png|jpg|jpeg|gif|ico|svg|webp)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
